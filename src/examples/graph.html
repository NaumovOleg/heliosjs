<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GraphQL Subscriptions Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 20px auto;
        padding: 0 20px;
      }
      .container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .box {
        border: 1px solid #ccc;
        padding: 15px;
        border-radius: 5px;
      }
      input,
      button {
        padding: 8px;
        margin: 5px;
        width: 100%;
        box-sizing: border-box;
      }
      #log,
      #subscriptionLog {
        background: #f5f5f5;
        border: 1px solid #ccc;
        padding: 10px;
        min-height: 200px;
        max-height: 300px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
      }
      .info {
        color: blue;
      }
    </style>
  </head>
  <body>
    <h1>📡 GraphQL Subscriptions Test</h1>

    <div class="container">
      <div class="box">
        <h3>✏️ Mutation: Create User</h3>
        <input type="text" id="name" placeholder="Name" value="John Doe" />
        <input type="email" id="email" placeholder="Email" value="john@example.com" />
        <button id="createUserBtn">Create User</button>
        <h4>Response Log:</h4>
        <div id="log"></div>
      </div>

      <div class="box">
        <h3>📡 Subscription: New Users</h3>
        <button id="subscribeBtn">🔌 Start Subscription</button>
        <button id="unsubscribeBtn" disabled>❌ Stop Subscription</button>
        <span id="status">⚫ Disconnected</span>
        <h4>Subscription Events:</h4>
        <div id="subscriptionLog"></div>
      </div>
    </div>

    <script type="module">
      import { createClient } from 'https://esm.sh/graphql-ws@5.16.0';

      // DOM elements
      const nameInput = document.getElementById('name');
      const emailInput = document.getElementById('email');
      const createUserBtn = document.getElementById('createUserBtn');
      const logDiv = document.getElementById('log');
      const subscribeBtn = document.getElementById('subscribeBtn');
      const unsubscribeBtn = document.getElementById('unsubscribeBtn');
      const statusSpan = document.getElementById('status');
      const subscriptionLog = document.getElementById('subscriptionLog');

      let subscription = null;
      let wsClient = null;

      function log(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = type;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      }

      function logSubscription(message, type = 'info') {
        const entry = document.createElement('div');
        entry.className = type;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        subscriptionLog.appendChild(entry);
        subscriptionLog.scrollTop = subscriptionLog.scrollHeight;
      }

      function setStatus(connected) {
        if (connected) {
          statusSpan.textContent = '🟢 Connected';
          statusSpan.style.color = 'green';
        } else {
          statusSpan.textContent = '⚫ Disconnected';
          statusSpan.style.color = 'gray';
        }
      }

      // Create User Mutation
      createUserBtn.addEventListener('click', async () => {
        const name = nameInput.value.trim();
        const email = emailInput.value.trim();

        if (!name || !email) {
          log('Please fill all fields', 'error');
          return;
        }

        const query = `
                mutation CreateUser($input: CreateUserInput!) {
                    createUser(input: $input) {
                        id
                        name
                        email
                    }
                }
            `;

        const variables = {
          input: { name, email },
        };

        try {
          log(`📤 Creating user: ${name} (${email})...`, 'info');

          const response = await fetch('http://localhost:3000/graphql', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ query, variables }),
          });

          const result = await response.json();

          if (result.errors) {
            log(`❌ Error: ${result.errors[0].message}`, 'error');
            console.error(result.errors);
          } else {
            log(`✅ User created: ${JSON.stringify(result.data.createUser)}`, 'success');
          }
        } catch (error) {
          log(`❌ Network error: ${error.message}`, 'error');
        }
      });

      // Subscribe to New Users
      subscribeBtn.addEventListener('click', () => {
        if (subscription) {
          logSubscription('⚠️ Already subscribed', 'error');
          return;
        }

        logSubscription('🔄 Connecting to WebSocket...', 'info');

        try {
          wsClient = createClient({
            url: 'ws://localhost:3000/graphql',
            on: {
              connected: () => {
                logSubscription('✅ WebSocket connected', 'success');
                setStatus(true);
              },
              closed: () => {
                logSubscription('❌ WebSocket closed', 'error');
                setStatus(false);
                subscription = null;
                toggleButtons();
              },
              error: (err) => {
                logSubscription(`⚠️ WebSocket error: ${err}`, 'error');
              },
            },
          });

          const subscriptionQuery = `
                    subscription {
                        newUser {
                            id
                            name
                            email
                        }
                    }
                `;

          subscription = wsClient.subscribe(
            { query: subscriptionQuery },
            {
              next: (data) => {
                logSubscription(`📩 New user: ${JSON.stringify(data.data?.newUser)}`, 'success');
              },
              error: (err) => {
                logSubscription(`❌ Subscription error: ${err}`, 'error');
                subscription = null;
                setStatus(false);
                toggleButtons();
              },
              complete: () => {
                logSubscription('🔚 Subscription completed', 'info');
                subscription = null;
                setStatus(false);
                toggleButtons();
              },
            },
          );

          toggleButtons();
        } catch (err) {
          logSubscription(`❌ Failed to connect: ${err}`, 'error');
        }
      });

      unsubscribeBtn.addEventListener('click', () => {
        if (subscription) {
          subscription();
          subscription = null;
          logSubscription('👋 Unsubscribed', 'info');
        }
        if (wsClient) {
          wsClient.dispose();
          wsClient = null;
        }
        setStatus(false);
        toggleButtons();
      });

      function toggleButtons() {
        subscribeBtn.disabled = !!subscription;
        unsubscribeBtn.disabled = !subscription;
      }

      // Cleanup on page unload
      window.addEventListener('beforeunload', () => {
        if (subscription) subscription();
        if (wsClient) wsClient.dispose();
      });
    </script>
  </body>
</html>
