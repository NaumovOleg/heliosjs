name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn build

      - name: Update peer dependencies
        run: node scripts/update-peer-deps.js

      - name: Commit peer deps updates
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/*/package.json
          git diff --staged --quiet || git commit -m "chore: update peer dependencies"

      - name: Version and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx lerna version --conventional-commits --yes --no-private
          pnpm run build
          npx lerna publish from-git --yes --npm-client-args="--provenance"

      - name: Push changes
        run: git push --follow-tags
