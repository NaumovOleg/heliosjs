name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish (all, core, http, aws, graphql)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - core
          - http
          - aws
          - graphql
      version-type:
        description: 'Version type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Update peerDependencies
        run: node scripts/update-peer-deps.js

      - name: Version package
        if: inputs.package != 'all'
        run: |
          npx lerna version ${{ inputs.version-type }} --yes --scope @heliosjs/${{ inputs.package }}

      - name: Version all packages
        if: inputs.package == 'all'
        run: |
          npx lerna version ${{ inputs.version-type }} --conventional-commits --yes

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npx lerna publish from-git --yes
